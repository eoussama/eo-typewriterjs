<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EO TypewriterJS — Sandbox</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- ── Header ─────────────────────────────────────────────────── -->
      <header class="header">
        <div class="header__brand">
          <h1 class="header__title">EO TypewriterJS</h1>
          <span class="header__badge">Sandbox</span>
        </div>
        <p class="header__sub">Interactive recipe playground with full playback controls</p>
      </header>

      <!-- ── Main grid ──────────────────────────────────────────────── -->
      <main class="main">

        <!-- ══ Left column ══════════════════════════════════════════ -->
        <div class="col col--left">

          <!-- Preview -->
          <section class="card preview-card">
            <header class="card__header">
              <h2 class="card__title">Preview</h2>
              <span id="status-badge" class="status-badge" data-status="idle">idle</span>
            </header>
            <div class="preview">
              <div id="typewriter-output" class="preview__output"></div>
            </div>
          </section>

          <!-- Playback controls -->
          <section class="card playback-card">
            <header class="card__header">
              <h2 class="card__title">Playback</h2>
              <span class="time-display">
                <span id="time-current">0ms</span>
                <span class="time-sep">/</span>
                <span id="time-duration">0ms</span>
              </span>
            </header>

            <!-- Seek slider -->
            <div class="seek-row">
              <input
                id="seek-slider"
                type="range"
                class="seek-slider"
                min="0"
                max="1000"
                value="0"
                step="1"
              />
            </div>

            <!-- Transport buttons -->
            <div class="transport">
              <button id="btn-step-back" class="transport-btn" title="Step backward" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
              </button>
              <button id="btn-stop" class="transport-btn" title="Stop" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
              </button>
              <button id="btn-pause" class="transport-btn" title="Pause" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
              </button>
              <button id="btn-play" class="transport-btn transport-btn--primary" title="Play">
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </button>
              <button id="btn-replay" class="transport-btn" title="Replay" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.72"/></svg>
              </button>
              <button id="btn-step-fwd" class="transport-btn" title="Step forward">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
              </button>
            </div>
          </section>

          <!-- Controls -->
          <section class="card controls-card">
            <h2 class="card__title">Controls</h2>
            <div class="controls-grid">
              <label class="field">
                <span class="field__label">Unit</span>
                <select id="ctrl-unit" class="field__input">
                  <option value="char">char</option>
                  <option value="grapheme">grapheme</option>
                  <option value="word">word</option>
                  <option value="line">line</option>
                </select>
              </label>

              <label class="field">
                <span class="field__label">Amount</span>
                <input id="ctrl-amount" type="number" min="1" max="20" value="1" class="field__input" />
              </label>

              <label class="field">
                <span class="field__label">Interval (ms)</span>
                <input id="ctrl-interval" type="number" min="0" max="2000" value="80" class="field__input" />
              </label>

              <label class="field">
                <span class="field__label">Rate <span id="ctrl-rate-label" class="field__badge">1×</span></span>
                <input id="ctrl-rate" type="range" min="0.1" max="8" step="0.1" value="1" class="field__input field__input--range" />
              </label>
            </div>
          </section>

          <!-- Custom editor -->
          <section class="card editor-card">
            <h2 class="card__title">Custom text</h2>
            <textarea
              id="editor"
              class="editor__textarea"
              spellcheck="false"
              placeholder="Type or paste text… (Ctrl+Enter to run)"
            ></textarea>
            <div class="editor-actions">
              <button id="btn-run" class="btn btn--primary">▶ Run</button>
              <button id="btn-clear" class="btn btn--ghost">✕ Clear</button>
            </div>
          </section>
        </div>

        <!-- ══ Right column ══════════════════════════════════════════ -->
        <div class="col col--right">

          <!-- Recipe picker -->
          <section class="card recipes-card">
            <header class="card__header">
              <h2 class="card__title">Recipes</h2>
            </header>

            <!-- Search -->
            <div class="search-row">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input id="recipe-search" type="search" class="search-input" placeholder="Search recipes…" />
            </div>

            <!-- Category chips -->
            <div id="category-filter" class="cat-filter"></div>

            <!-- Recipe list -->
            <div id="recipe-list" class="recipe-list"></div>

            <!-- Variant chips -->
            <div id="variant-chips" class="variant-chips"></div>
          </section>

          <!-- Source code -->
          <section class="card source-card">
            <header class="card__header">
              <h2 class="card__title">Source</h2>
              <button class="copy-btn" id="btn-copy" title="Copy source">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy
              </button>
            </header>
            <pre class="source-pre"><code id="source-code" class="source-code"></code></pre>
          </section>

        </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script>
      // Copy button
      document.getElementById('btn-copy')?.addEventListener('click', function() {
        const code = document.getElementById('source-code')?.textContent ?? '';
        navigator.clipboard.writeText(code).then(() => {
          this.textContent = '✓ Copied';
          setTimeout(() => { this.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy'; }, 1500);
        });
      });
    </script>
  </body>
</html>
